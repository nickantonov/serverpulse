<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ccff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffd93d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6bcb77;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>

  <!-- Grid pattern -->
  <g opacity="0.1" stroke="#00ff88" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
  </g>

  <!-- Pulse line -->
  <polyline points="30,100 80,100 100,60 120,140 140,80 160,120 180,100 220,100"
    fill="none" stroke="url(#pulse)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Monitor icon -->
  <g transform="translate(260, 55)">
    <rect x="0" y="0" width="80" height="60" rx="6" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <rect x="8" y="8" width="64" height="44" rx="2" fill="#0f0f23"/>
    <!-- Screen content - bar chart -->
    <rect x="16" y="36" width="8" height="12" fill="#00ff88" opacity="0.8"/>
    <rect x="28" y="28" width="8" height="20" fill="#00ccff" opacity="0.8"/>
    <rect x="40" y="20" width="8" height="28" fill="#00ff88" opacity="0.8"/>
    <rect x="52" y="32" width="8" height="16" fill="#00ccff" opacity="0.8"/>
    <!-- Stand -->
    <rect x="32" y="60" width="16" height="8" fill="url(#accent)"/>
    <rect x="24" y="68" width="32" height="4" rx="2" fill="url(#accent)"/>
  </g>

  <!-- Title -->
  <text x="380" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="url(#accent)">
    ServerPulse
  </text>

  <!-- Subtitle -->
  <text x="380" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#8888aa">
    Real-time Server Monitoring + Telegram Alerts
  </text>

  <!-- Version badge -->
  <rect x="380" y="148" width="60" height="24" rx="12" fill="#00ff88" opacity="0.2"/>
  <text x="410" y="165" font-family="monospace" font-size="12" fill="#00ff88" text-anchor="middle">v1.0</text>

  <!-- Status dots -->
  <circle cx="460" cy="160" r="5" fill="#6bcb77"/>
  <circle cx="480" cy="160" r="5" fill="#6bcb77"/>
  <circle cx="500" cy="160" r="5" fill="#ffd93d"/>

  <!-- Borodachamba badge -->
  <text x="720" y="185" font-family="monospace" font-size="10" fill="#555577" text-anchor="middle">
    borodachamba.pp.ua
  </text>
</svg>
